name: Validate Agent Kit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Kit Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create mock .agent symlinks for validation
        run: |
          mkdir -p .agent
          for item in agents rules skills workflows templates scripts; do
            if [ -d "$item" ]; then
              ln -s "$(pwd)/$item" ".agent/$item"
            fi
          done

      - name: Run kit validation
        run: python3 scripts/validate-kit.py --target .

      - name: Check all agent files have required frontmatter
        run: |
          echo "Checking agent frontmatter..."
          ERRORS=0
          for file in agents/**/*.md; do
            if ! grep -q "^name:" "$file"; then
              echo "❌ Missing 'name:' in $file"
              ERRORS=$((ERRORS+1))
            fi
            if ! grep -q "^description:" "$file"; then
              echo "❌ Missing 'description:' in $file"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS frontmatter errors."
            exit 1
          fi
          echo "✅ All agent files have required frontmatter."

      - name: Check all skills have SKILL.md
        run: |
          echo "Checking skill SKILL.md files..."
          ERRORS=0
          for dir in skills/**/*/ ; do
            if [ -d "$dir" ] && [ ! -f "${dir}SKILL.md" ]; then
              echo "❌ Missing SKILL.md in $dir"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS missing SKILL.md files."
            exit 1
          fi
          echo "✅ All skill directories have SKILL.md."
